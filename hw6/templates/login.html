<h2>Login</h2>

<form method="post">
    {% csrf_token %}

    <input name="username" placeholder="Username"><br><br>
    <input type="password" name="password" placeholder="Password"><br><br>

    <button>Login</button>
</form>

<a href="/hw6/register/">Register</a>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
