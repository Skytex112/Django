<h2>Add Book</h2>

<form method="post">
    {% csrf_token %}

    <input name="title" placeholder="Title"><br><br>
    <input name="author" placeholder="Author"><br><br>
    <input name="year" placeholder="Year"><br><br>
    <input name="style" placeholder="Style"><br><br>
    <input name="publisher" placeholder="Publisher"><br><br>

    <button>Add</button>
</form>
