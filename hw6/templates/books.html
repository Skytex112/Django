<h1>Books</h1>

<a href="?">All</a> |
<a href="?mode=available">Available</a>

<hr>

<a href="/hw6/add-book/">Add Book</a>

<hr>

{% for book in books %}

<h3>{{ book.title }}</h3>
<p>{{ book.author }}</p>
<p>{{ book.year }}</p>
<p>{{ book.style }}</p>
<p>{{ book.publisher }}</p>

{% if book.is_available %}
<p style="color:green;">Available</p>
{% else %}
<p style="color:red;">Taken</p>
{% endif %}

<hr>

{% endfor %}
