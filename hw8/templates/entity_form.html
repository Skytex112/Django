{% extends "base_layout.html" %}

{% block content %}
<div class="container" style="margin-top: 50px; max-width: 600px; margin-bottom: 50px;">
    <div class="card z-depth-2" style="border-radius: 8px;">
        <div class="card-content" style="padding: 40px;">
            <span class="card-title blue-text text-darken-3" style="font-weight: bold; font-size: 1.6rem;">
                {% if form.instance.pk %}
                     Редактирование: {{ entity_type|upper }}
                {% else %}
                     Добавление: {{ entity_type|upper }}
                {% endif %}
            </span>
            <div class="divider" style="margin-top: 10px; margin-bottom: 30px;"></div>
            
            <form method="POST" autocomplete="off">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col s12 input-field-custom">
                        {{ form.as_p }}
                    </div>
                </div>
                
                <div class="card-action" style="padding: 20px 0 0 0; background: none; border-top: 1px solid #e0e0e0; display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                    <a href="{% url 'business_dashboard' %}" class="btn-flat waves-effect grey-text">Отмена</a>
                    <button type="submit" class="btn green waves-effect waves-light">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .input-field-custom p { margin-bottom: 25px; }
    .input-field-custom label { color: #424242; font-size: 1rem; font-weight: 500; display: block; margin-bottom: 5px; }
    .input-field-custom input, .input-field-custom textarea {
        display: block; width: 100%; height: 2.8rem; background-color: transparent;
        border: none; border-bottom: 1px solid #9e9e9e; border-radius: 0; outline: none; font-size: 1rem;
    }
    .input-field-custom input:focus, .input-field-custom textarea:focus { border-bottom: 2px solid #1565c0; }
    .input-field-custom select { display: block !important; border: 1px solid #ccc; border-radius: 4px; padding: 8px; height: auto; margin-top: 5px; background-color: #fff; }
</style>
{% endblock content %}
